<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Tasks - StudyFlow</title>
    <link rel="stylesheet" href="/static/style.css">
    <script defer src="/static/auth.js?v=3"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.js"></script>
    <style>
        .download-section { display: flex; gap: 12px; margin-bottom: 24px; }
        .btn-download { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .btn-download:hover { background: var(--primary-hover); }
        .tasks-by-date { margin-top: 24px; }
        .date-section h3 { font-size: 14px; font-weight: 600; color: var(--text-dark); margin: 24px 0 12px 0; padding-bottom: 8px; border-bottom: 2px solid var(--primary); }
        .task-card-detailed { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; display: flex; gap: 16px; align-items: flex-start; transition: all 0.2s; }
        .task-card-detailed:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .task-card-detailed.completed { opacity: 0.6; background: #f9fafb; }
        .task-card-detailed.overdue { border-left: 4px solid var(--red-text); }
        .task-checkbox-detailed { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; transition: all 0.2s; }
        .task-checkbox-detailed.checked { background: var(--primary); border-color: var(--primary); color: white; }
        .task-content { flex: 1; }
        .task-title-detailed { font-size: 14px; font-weight: 600; color: var(--text-dark); margin: 0 0 6px 0; }
        .task-meta-detailed { display: flex; gap: 16px; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; flex-wrap: wrap; }
        .task-meta-item { display: flex; align-items: center; gap: 4px; }
        .task-status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .badge-pending { background: var(--red-bg); color: var(--red-text); }
        .badge-completed { background: var(--green-bg); color: var(--green-text); }
        .badge-overdue { background: #fee2e2; color: #991b1b; }
        
        .empty-state-large {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .empty-state-large i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .loading-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">StudyFlow</div>
        <div class="subtitle">AI Smart Planner</div>
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/planner">Planner</a>
            <a href="/link-library">Link Library</a>
            <a href="/mindmap">Mind Maps</a>
            <a href="/tasks" class="active">All Tasks</a>
            <a href="/profile">Profile</a>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="topbar">
            <div>
                <div class="greeting">Task Management</div>
            </div>
            <div class="actions">
                <button class="btn-dark" onclick="window.location.href='/setup'">Set New Goal</button>
            </div>
        </div>

        <div class="content">
            <div class="download-section" style="display: flex; gap: 12px; margin-bottom: 24px; justify-content: flex-start; align-items: center;">
                <button class="btn-download" onclick="downloadAsWord()">📄 Download as Word Doc</button>
                <button class="btn-download" onclick="downloadAsJSON()">📋 Download as JSON</button>
            </div>

            <div id="subjectsSection" style="background: white; border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 24px;">
                <h3 style="margin: 0 0 12px 0; color: var(--text-dark);">📚 Active Goals</h3>
                <div id="subjectsList" style="display: flex; flex-wrap: wrap; gap: 8px;">
                    <!-- Populated by JS -->
                </div>
            </div>

            <div class="metrics-row">
                <div class="metric-card">
                    <div class="title">Total Tasks</div>
                    <div class="value val-blue" id="stat-total">0</div>
                </div>
                <div class="metric-card">
                    <div class="title">Completed</div>
                    <div class="value val-green" id="stat-completed">0</div>
                </div>
                <div class="metric-card">
                    <div class="title">Pending</div>
                    <div class="value val-orange" id="stat-pending">0</div>
                </div>
                <div class="metric-card">
                    <div class="title">Overdue</div>
                    <div class="value val-red" id="stat-overdue">0</div>
                </div>
            </div>

            <div class="filters-row">
                <div class="filter-group">
                    <span class="filter-label">Filter by Status</span>
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                    <button class="filter-btn" data-filter="overdue">Overdue</button>
                </div>
            </div>

            <div class="tasks-by-date" id="allTasksList">
                <!-- Populate via JS -->
            </div>
        </div>
    </div>

    <script>
        let allTasks = [];
        let planData = {};
        let taskStatus = {};
        let currentFilter = 'all';
        let todayStr = new Date().toISOString().split('T')[0];
        
        // FIX 8: Load tasks from backend API instead of just localStorage
        async function loadTasksFromBackend() {
            try {
                // Load task stats from backend
                const statsRes = await authFetch('/api/tasks/stats');
                if (statsRes && statsRes.ok) {
                    const statsData = await statsRes.json();
                    if (statsData.status === 'success') {
                        document.getElementById('totalTasks').textContent = statsData.stats.total;
                        document.getElementById('completedTasks').textContent = statsData.stats.completed;
                        document.getElementById('pendingTasks').textContent = statsData.stats.pending;
                        document.getElementById('overdueTasks').textContent = statsData.stats.overdue;
                    }
                }
                
                // Load plans from backend
                const plansRes = await authFetch('/api/plans');
                if (plansRes && plansRes.ok) {
                    const plansData = await plansRes.json();
                    if (plansData.plans && plansData.plans.length > 0) {
                        // Update studyPlan in localStorage from latest plan
                        const latestPlan = plansData.plans[0];
                        if (latestPlan.planJson) {
                            localStorage.setItem('studyPlan', JSON.stringify(latestPlan.planJson));
                            loadAllTasks(); // Reload tasks with updated plan
                        }
                    }
                }
            } catch (err) {
                console.error('[Tasks] Failed to load from backend:', err);
                // Fall back to localStorage
                loadAllTasks();
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Tasks: Initializing auth...');
            if (typeof initializePageAuthUI !== 'undefined') {
                initializePageAuthUI(); // Initialize auth UI
            }
            
            // Load user display name from localStorage or backend
            const savedName = localStorage.getItem('userDisplayName');
            if (savedName) {
                const displayNameEl = document.getElementById('userDisplayName');
                if (displayNameEl) {
                    displayNameEl.textContent = savedName;
                }
            }
            
            // FIX 8: Try to load from backend first, then fall back to localStorage
            window.addEventListener('authReady', async () => {
                console.log('[Tasks] Auth ready, loading from backend');
                await loadTasksFromBackend();
            });
            
            // Fallback: load from localStorage immediately and when auth not ready
            loadAllTasks();
            
            // Also try backend after auth is ready
            setTimeout(() => {
                console.log('[Tasks] Attempting to load from backend');
                loadTasksFromBackend();
            }, 1000);
        });
        
        // Listen for auth state changes from other tabs
        window.addEventListener('authStateChanged', (event) => {
            console.log('Tasks: Auth state changed, refreshing UI');
            
            // If displayName was updated, refresh it immediately
            if (event.detail && event.detail.updated === 'displayName') {
                const updatedName = localStorage.getItem('userDisplayName');
                if (updatedName) {
                    document.getElementById('userDisplayName').textContent = updatedName;
                    console.log('Tasks: Updated display name to:', updatedName);
                }
            }
            
            if (typeof initializePageAuthUI !== 'undefined') {
                initializePageAuthUI();
            }
        });

        // Listen for storage changes from other tabs (cross-tab sync)
        window.addEventListener('storage', (event) => {
            if (event.key === 'userDisplayName' || event.key === '__sync_displayName') {
                const updatedName = localStorage.getItem('userDisplayName');
                if (updatedName) {
                    const userDisplayName = document.getElementById('userDisplayName');
                    if (userDisplayName) {
                        userDisplayName.textContent = updatedName;
                        console.log('Tasks: Display name updated via storage event:', updatedName);
                    }
                }
            }
        });
        
        function loadAllTasks() {
            const planStr = localStorage.getItem('studyPlan');
            taskStatus = JSON.parse(localStorage.getItem('taskStatus')) || {};
            
            if (!planStr) {
                showEmptyState();
                return;
            }
            
            try {
                planData = JSON.parse(planStr);
                
                // Extract plan from long-term structure if needed
                if (planData.plan && typeof planData.plan === 'object' && !Array.isArray(planData.plan)) {
                    console.log('[Tasks] Long-term plan detected, extracting from .plan property');
                    planData = planData.plan;
                }
                
                processTasks();
            } catch(e) {
                console.error('Error parsing plan:', e);
                showEmptyState();
            }
        }
        
        function processTasks() {
            allTasks = [];
            
            Object.keys(planData)
                .filter(date => date.includes('-')) // Only date keys (YYYY-MM-DD format)
                .forEach(date => {
                    const tasks = planData[date];
                    if (!tasks || !Array.isArray(tasks)) return;
                    
                    tasks.forEach((t, index) => {
                        const id = `${date}_${t.subject}_${index}`;
                        const isCompleted = !!taskStatus[id];
                        const isOverdue = new Date(date) < new Date(todayStr) && !isCompleted;
                        
                        allTasks.push({
                            id, 
                            date, 
                            subject: t.subject, 
                            task: t.task, 
                            isCompleted, 
                            isOverdue,
                            index
                        });
                    });
                });
            
            // Sort tasks by date (oldest first)
            allTasks.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            console.log(`Loaded ${allTasks.length} tasks`);
            
            if (allTasks.length === 0) {
                showEmptyState();
            } else {
                renderSubjects();
                render();
            }
        }
        
        function showEmptyState() {
            document.getElementById('subjectsSection').style.display = 'none';
            document.getElementById('allTasksList').innerHTML = `
                <div class="empty-state-large">
                    <i class="fas fa-tasks"></i>
                    <h3>No Study Tasks Yet</h3>
                    <p>Create your first study plan to see tasks here.</p>
                    <button class="btn-download" onclick="window.location.href='/setup'" style="margin-top: 20px;">Create Study Plan</button>
                </div>
            `;
            
            // Reset stats to zero
            document.getElementById('stat-total').innerText = '0';
            document.getElementById('stat-completed').innerText = '0';
            document.getElementById('stat-pending').innerText = '0';
            document.getElementById('stat-overdue').innerText = '0';
        }
        
        function renderSubjects() {
            const subjectsList = document.getElementById('subjectsList');
            const uniqueSubjects = [...new Set(allTasks.map(t => t.subject))];
            
            if (uniqueSubjects.length === 0) {
                subjectsList.innerHTML = '<p style="color: var(--text-muted); margin: 0;">No active goals</p>';
                return;
            }
            
            subjectsList.innerHTML = uniqueSubjects.map(subject => {
                const subjectTasks = allTasks.filter(t => t.subject === subject);
                const completedCount = subjectTasks.filter(t => t.isCompleted).length;
                const totalCount = subjectTasks.length;
                
                return `
                    <div style="display: flex; align-items: center; gap: 8px; background: var(--bg-light); border: 1px solid var(--border); border-radius: 20px; padding: 8px 12px; font-size: 13px;">
                        <span>${subject}</span>
                        <span style="background: var(--primary); color: white; border-radius: 12px; padding: 2px 8px; font-size: 11px;">${completedCount}/${totalCount}</span>
                        <button onclick="clearSubject('${subject.replace(/'/g, "\\'")}')" style="background: none; border: none; cursor: pointer; padding: 0; color: var(--red-text); font-size: 16px; display: flex; align-items: center;" title="Delete this goal">✕</button>
                    </div>
                `;
            }).join('');
        }
        
        function render() {
            const listEl = document.getElementById('allTasksList');
            
            let filtered = [...allTasks];
            if (currentFilter === 'pending') filtered = allTasks.filter(t => !t.isCompleted && !t.isOverdue);
            if (currentFilter === 'completed') filtered = allTasks.filter(t => t.isCompleted);
            if (currentFilter === 'overdue') filtered = allTasks.filter(t => t.isOverdue);

            // Update Stats
            const total = allTasks.length;
            const completed = allTasks.filter(t => t.isCompleted).length;
            const overdue = allTasks.filter(t => t.isOverdue).length;
            const pending = total - completed;

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-completed').innerText = completed;
            document.getElementById('stat-pending').innerText = pending;
            document.getElementById('stat-overdue').innerText = overdue;

            // Group by date
            const grouped = {};
            filtered.forEach(t => {
                if (!grouped[t.date]) grouped[t.date] = [];
                grouped[t.date].push(t);
            });

            if (Object.keys(grouped).length === 0) {
                listEl.innerHTML = '<div class="empty-state-large"><p>No tasks match your filter. Good job staying on top of things!</p></div>';
                return;
            }

            // Separate missed tasks (overdue and incomplete)
            const missedTasks = allTasks.filter(t => t.date < todayStr && !t.isCompleted);
            let missedTasksHtml = '';
            
            if (missedTasks.length > 0 && (currentFilter === 'all' || currentFilter === 'pending' || currentFilter === 'overdue')) {
                const tasksHtml = missedTasks.map(t => {
                    return `
                        <div class="task-card-detailed overdue">
                            <div class="task-checkbox-detailed" onclick="toggleTask('${t.id}')">
                                ${t.isCompleted ? '✓' : ''}
                            </div>
                            <div class="task-content">
                                <h4 class="task-title-detailed">${escapeHtml(t.task)}</h4>
                                <div class="task-meta-detailed">
                                    <span class="task-meta-item"><strong>📖 ${escapeHtml(t.subject)}</strong></span>
                                    <span class="task-meta-item">•</span>
                                    <span class="task-meta-item">📅 Was due: ${t.date}</span>
                                </div>
                                <span class="task-status-badge badge-overdue">Missed</span>
                            </div>
                            <button onclick="deleteTask('${t.id}')" style="background: none; border: none; cursor: pointer; padding: 4px 8px; color: var(--red-text); font-size: 16px; display: flex; align-items: center; flex-shrink: 0;" title="Delete this task">🗑️</button>
                        </div>
                    `;
                }).join('');
                
                missedTasksHtml = `
                    <div class="date-section" style="background: #fee2e2; border: 1px solid #fecaca; border-radius: 8px; padding: 12px; margin-bottom: 20px;">
                        <h3 style="color: #991b1b; margin: 0 0 12px 0;">⚠️ Missed Tasks (${missedTasks.length})</h3>
                        ${tasksHtml}
                    </div>
                `;
            }

            // Render grouped tasks
            const groupedHtml = Object.keys(grouped).sort().map(date => {
                const dateObj = new Date(date);
                const displayDate = dateObj.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
                const isToday = date === todayStr;
                const isFuture = date > todayStr;
                
                let headerIcon = '📆';
                if (isToday) headerIcon = '📅';
                if (date < todayStr) headerIcon = '⏰';
                
                const headerText = isToday ? 'Today' : (isFuture ? 'Upcoming' : 'Overdue');
                
                const tasksHtml = grouped[date].map(t => {
                    const statusBadge = t.isOverdue ? '<span class="task-status-badge badge-overdue">Overdue</span>' : 
                                      t.isCompleted ? '<span class="task-status-badge badge-completed">Completed</span>' : 
                                      '<span class="task-status-badge badge-pending">Pending</span>';
                    
                    const isChecked = t.isCompleted ? 'checked' : '';
                    
                    return `
                        <div class="task-card-detailed ${t.isCompleted ? 'completed' : ''} ${t.isOverdue ? 'overdue' : ''}">
                            <div class="task-checkbox-detailed ${isChecked}" onclick="toggleTask('${t.id}')">
                                ${t.isCompleted ? '✓' : ''}
                            </div>
                            <div class="task-content">
                                <h4 class="task-title-detailed">${escapeHtml(t.task)}</h4>
                                <div class="task-meta-detailed">
                                    <span class="task-meta-item"><strong>📖 ${escapeHtml(t.subject)}</strong></span>
                                    <span class="task-meta-item">•</span>
                                    <span class="task-meta-item">📅 Scheduled: ${date}</span>
                                </div>
                                ${statusBadge}
                            </div>
                            <button onclick="deleteTask('${t.id}')" style="background: none; border: none; cursor: pointer; padding: 4px 8px; color: var(--red-text); font-size: 16px; display: flex; align-items: center; flex-shrink: 0;" title="Delete this task">🗑️</button>
                        </div>
                    `;
                }).join('');
                
                return `
                    <div class="date-section">
                        <h3>${headerIcon} ${headerText} - ${displayDate}</h3>
                        ${tasksHtml}
                    </div>
                `;
            }).join('');
            
            listEl.innerHTML = missedTasksHtml + groupedHtml;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        window.toggleTask = function(id) {
            const task = allTasks.find(t => t.id === id);
            if(task) {
                task.isCompleted = !task.isCompleted;
                if(task.isCompleted) {
                    task.isOverdue = false;
                } else {
                    task.isOverdue = task.date < todayStr;
                }
                taskStatus[id] = task.isCompleted;
                localStorage.setItem('taskStatus', JSON.stringify(taskStatus));
                
                // Save to database if authenticated
                (async () => {
                    const token = await getAccessToken();
                    if (token) {
                        try {
                            const planStr = localStorage.getItem('studyPlan');
                            await authFetch('/api/save-study-session', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    studyPlan: planStr ? JSON.parse(planStr) : planData,
                                    taskStatus: taskStatus,
                                    planType: localStorage.getItem('planType') || 'exam'
                                })
                            });
                        } catch (e) {
                            console.warn('[Tasks] Failed to sync task to DB:', e);
                        }
                    }
                })();
                
                renderSubjects();
                render();
                
                // Show feedback
                const message = task.isCompleted ? '✅ Task completed! Great job!' : '🔄 Task marked as pending';
                showToast(message);
            }
        };
        
        window.clearSubject = function(subject) {
            if (confirm(`Delete all tasks for "${subject}"? This will remove this subject and all its scheduled tasks.`)) {
                // Remove subject from plan
                Object.keys(planData)
                    .filter(date => date.includes('-')) // Only date keys
                    .forEach(date => {
                        planData[date] = planData[date].filter(t => t.subject !== subject);
                        if (planData[date].length === 0) {
                            delete planData[date];
                        }
                    });
                
                // Remove subject tasks from task status
                const subjectTaskIds = allTasks.filter(t => t.subject === subject).map(t => t.id);
                subjectTaskIds.forEach(id => {
                    delete taskStatus[id];
                });
                
                // Update localStorage
                localStorage.setItem('studyPlan', JSON.stringify(planData));
                localStorage.setItem('taskStatus', JSON.stringify(taskStatus));
                
                // Sync to database
                (async () => {
                    const token = await getAccessToken();
                    if (token) {
                        try {
                            await authFetch('/api/save-study-session', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    studyPlan: planData,
                                    taskStatus: taskStatus,
                                    planType: localStorage.getItem('planType') || 'exam'
                                })
                            });
                        } catch (e) {
                            console.warn('[Tasks] Failed to sync to DB:', e);
                        }
                    }
                })();
                
                // Reload the page
                location.reload();
            }
        };
        
        window.deleteTask = function(taskId) {
            const task = allTasks.find(t => t.id === taskId);
            if (!task) return;
            
            if (confirm(`Delete task: "${task.task}"? This action cannot be undone.`)) {
                // Remove task from planData
                if (planData[task.date]) {
                    planData[task.date] = planData[task.date].filter((t, index) => {
                        const id = `${task.date}_${t.subject}_${index}`;
                        return id !== taskId;
                    });
                    if (planData[task.date].length === 0) {
                        delete planData[task.date];
                    }
                }
                
                // Remove task from taskStatus
                delete taskStatus[taskId];
                
                // Update localStorage
                localStorage.setItem('studyPlan', JSON.stringify(planData));
                localStorage.setItem('taskStatus', JSON.stringify(taskStatus));
                
                // Sync to database
                (async () => {
                    const token = await getAccessToken();
                    if (token) {
                        try {
                            await authFetch('/api/save-study-session', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    studyPlan: planData,
                                    taskStatus: taskStatus,
                                    planType: localStorage.getItem('planType') || 'exam'
                                })
                            });
                        } catch (e) {
                            console.warn('[Tasks] Failed to sync to DB:', e);
                        }
                    }
                })();
                
                // Reload view
                processTasks();
                render();
                showToast('Task deleted successfully');
            }
        };
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: #0f172a;
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                font-size: 14px;
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 2000);
        }
        
        window.downloadAsWord = async function() {
            try {
                const btn = event?.target;
                if (btn) {
                    btn.innerText = '⏳ Generating...';
                    btn.disabled = true;
                }
                
                let docxLib = window.docx;
                let retries = 0;
                while (!docxLib && retries < 30) {
                    await new Promise(r => setTimeout(r, 100));
                    docxLib = window.docx;
                    retries++;
                }
                
                if (!docxLib) {
                    throw new Error('Docx library failed to load');
                }
                
                const { Document, Packer, Paragraph, HeadingLevel } = docxLib;
                const sections = [];
                
                sections.push(new Paragraph({ text: 'StudyFlow - Complete Study Plan', heading: HeadingLevel.HEADING_1 }));
                sections.push(new Paragraph({ text: `Generated on ${new Date().toLocaleString()}`, spacing: { after: 400 } }));
                
                const total = allTasks.length;
                const completed = allTasks.filter(t => t.isCompleted).length;
                const pending = total - completed;
                const overdue = allTasks.filter(t => t.isOverdue).length;
                
                sections.push(new Paragraph({ text: 'Summary Statistics', heading: HeadingLevel.HEADING_2 }));
                sections.push(new Paragraph({ text: `Total Tasks: ${total} | Completed: ${completed} | Pending: ${pending} | Overdue: ${overdue}`, spacing: { after: 400 } }));
                sections.push(new Paragraph({ text: 'Complete Task Schedule', heading: HeadingLevel.HEADING_2 }));
                
                const grouped = {};
                allTasks.forEach(t => {
                    if (!grouped[t.date]) grouped[t.date] = [];
                    grouped[t.date].push(t);
                });
                
                Object.keys(grouped).sort().forEach(date => {
                    const dateObj = new Date(date);
                    const displayDate = dateObj.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
                    sections.push(new Paragraph({ text: displayDate, heading: HeadingLevel.HEADING_3 }));
                    
                    grouped[date].forEach(t => {
                        const status = t.isOverdue ? 'OVERDUE' : t.isCompleted ? 'COMPLETED' : 'PENDING';
                        sections.push(new Paragraph({ text: `[${t.subject}] ${t.task} (${status})`, spacing: { after: 200 } }));
                    });
                });
                
                const doc = new Document({ sections: [{ children: sections }] });
                const blob = await Packer.toBlob(doc);
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `StudyPlan-${new Date().toISOString().split('T')[0]}.docx`;
                link.click();
                URL.revokeObjectURL(url);
                
                if (btn) {
                    btn.innerText = '📄 Download as Word Doc';
                    btn.disabled = false;
                }
            } catch (err) {
                console.error('Word download error:', err);
                alert('Error: ' + err.message);
                const btn = event?.target;
                if (btn) {
                    btn.innerText = '📄 Download as Word Doc';
                    btn.disabled = false;
                }
            }
        };
        
        window.downloadAsJSON = function() {
            const data = {
                generatedAt: new Date().toISOString(),
                summary: {
                    total: allTasks.length,
                    completed: allTasks.filter(t => t.isCompleted).length,
                    pending: allTasks.filter(t => !t.isCompleted).length,
                    overdue: allTasks.filter(t => t.isOverdue).length
                },
                tasks: allTasks
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `StudyPlan-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
        };
        
        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                render();
            });
        });
        
        // Add animation style
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
