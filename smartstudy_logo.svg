<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4F46E5" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="150" height="150" rx="32" ry="32" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Shine overlay -->
  <rect x="0" y="0" width="150" height="150" rx="32" ry="32" fill="url(#shineGrad)"/>

  <!-- Book shape -->
  <rect x="30" y="42" width="56" height="72" rx="6" ry="6" fill="white" opacity="0.95"/>
  <rect x="30" y="42" width="8" height="72" rx="4" ry="4" fill="white" opacity="0.5"/>

  <!-- Book lines (text) -->
  <rect x="46" y="60" width="30" height="4" rx="2" fill="#4F46E5" opacity="0.4"/>
  <rect x="46" y="70" width="24" height="4" rx="2" fill="#4F46E5" opacity="0.3"/>
  <rect x="46" y="80" width="28" height="4" rx="2" fill="#4F46E5" opacity="0.3"/>
  <rect x="46" y="90" width="20" height="4" rx="2" fill="#4F46E5" opacity="0.2"/>

  <!-- Brain / spark icon - top right of book -->
  <circle cx="105" cy="55" r="22" fill="white" opacity="0.15"/>
  <circle cx="105" cy="55" r="16" fill="white" opacity="0.12"/>

  <!-- Spark / star lines -->
  <line x1="105" y1="36" x2="105" y2="43" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="105" y1="67" x2="105" y2="74" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="86" y1="55" x2="93" y2="55" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="117" y1="55" x2="124" y2="55" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="91" y1="41" x2="96" y2="46" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="114" y1="64" x2="119" y2="69" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="119" y1="41" x2="114" y2="46" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="96" y1="64" x2="91" y2="69" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Center star/dot -->
  <circle cx="105" cy="55" r="5" fill="white" opacity="0.9"/>

  <!-- Green accent dot (accent color) -->
  <circle cx="88" cy="104" r="9" fill="#10B981"/>
  <path d="M84 104 L87 107 L92 101" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
